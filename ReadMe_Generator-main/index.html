<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generate professional README.md files from local folders or public GitHub repositories." />
    <title>GitHub README Generator</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("readme-theme-v2");
          document.documentElement.dataset.theme = theme === "light" || theme === "dark" ? theme : "dark";
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
