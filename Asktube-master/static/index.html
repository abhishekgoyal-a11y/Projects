<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Q&A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">▶</div>
        <span class="brand-name">AskTube</span>
      </div>

      <div class="sidebar-section">
        <label class="field-label">YouTube URL</label>
        <div class="input-group">
          <span class="input-icon">🔗</span>
          <input type="text" id="videoUrl" placeholder="https://youtube.com/watch?v=..." />
        </div>
        <button id="loadBtn" onclick="loadVideo()">
          <span id="btnSpinner" class="btn-spinner hidden"></span>
          <span id="btnText">Load Video</span>
        </button>
      </div>

      <div class="status-card" id="statusCard">
        <div class="status-row">
          <span id="statusDot" class="dot grey"></span>
          <span id="statusMsg">No video loaded</span>
        </div>
        <div class="progress-bar hidden" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="statusSub" class="status-sub"></div>
      </div>

      <div class="sidebar-footer">
        <p>Powered by Groq · LangChain</p>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <span id="videoLabel" class="video-label">Start by loading a video →</span>
        </div>
      </div>

      <div class="chat-body" id="chatBody">
        <div class="empty-state" id="emptyState">
          <div class="empty-glow"></div>
          <div class="empty-icon">🎬</div>
          <h2>YouTube Q&amp;A Bot</h2>
          <p>Paste a YouTube link, load the video,<br/>then ask anything about it.</p>
          <div class="feature-pills">
            <span class="pill">📚 Lectures</span>
            <span class="pill">🎙 Podcasts</span>
            <span class="pill">🛠 Tutorials</span>
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <div class="chat-input-wrap">
          <input type="text" id="questionInput"
                 placeholder="Ask a question about the video..."
                 disabled
                 onkeydown="if(event.key==='Enter') askQuestion()" />
          <button id="askBtn" onclick="askQuestion()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="chat-hint" id="chatHint">Load a video to start asking questions</p>
      </div>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
