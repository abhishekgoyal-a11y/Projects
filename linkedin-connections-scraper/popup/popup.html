<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Connections Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>LinkedIn Connections Scraper</h1>
      <p class="subtitle">Scroll your full connections list and export</p>
    </header>

    <section class="config">
      <label class="checkbox-row">
        <input type="checkbox" id="scrapeAll" checked />
        <span>Scrape all connections (scroll until list ends)</span>
      </label>

      <div id="targetWrap" class="target-wrap hidden">
        <label for="targetCount">Max connections to collect</label>
        <input type="number" id="targetCount" min="1" max="30000" value="500" />
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn btn-primary">Start Scraping</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>Stop</button>
    </section>

    <section class="status" id="statusSection">
      <div class="status-row">
        <span class="status-label">Status:</span>
        <span id="statusText" class="status-value">Idle</span>
      </div>
      <div class="status-row">
        <span class="status-label">Collected:</span>
        <span id="connCount" class="status-value">0</span>
        <span id="targetDisplay" class="status-target"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="logArea" class="log-area" aria-live="polite"></div>
    </section>

    <section class="exports">
      <button id="downloadJsonBtn" class="btn btn-export" disabled>Download JSON</button>
      <button id="downloadCsvBtn" class="btn btn-export" disabled>Download CSV</button>
      <button id="clearBtn" class="btn btn-danger">Clear Data</button>
    </section>

    <section class="enrich-section">
      <div class="enrich-header">
        <span class="enrich-title">Enrich with Contact Info</span>
        <span class="enrich-note">Opens each profile · extracts headline, phone &amp; email · auto-saves after each</span>
      </div>

      <div class="load-json-row">
        <button id="loadJsonBtn" class="btn btn-load">Load JSON file</button>
        <span id="loadedFilename" class="loaded-filename">No file loaded</span>
        <input type="file" id="jsonFileInput" accept=".json" style="display:none" />
      </div>

      <div class="target-wrap">
        <label for="enrichLimit">Profiles to enrich</label>
        <input type="number" id="enrichLimit" min="1" max="30000" value="50" />
      </div>
      <div class="controls">
        <button id="enrichBtn" class="btn btn-enrich" disabled>Enrich Profiles</button>
        <button id="stopEnrichBtn" class="btn btn-secondary" disabled>Stop</button>
      </div>
      <div class="enrich-progress-row" id="enrichProgressRow" style="display:none">
        <span class="status-label">Enriching:</span>
        <span id="enrichCount" class="status-value">0 / 0</span>
        <span id="enrichName" class="enrich-name"></span>
      </div>
    </section>

    <footer>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
