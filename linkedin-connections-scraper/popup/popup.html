<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Connections Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>LinkedIn Connections Scraper</h1>
      <p class="subtitle">Scroll your full connections list and export</p>
    </header>

    <section class="config">
      <label class="checkbox-row">
        <input type="checkbox" id="scrapeAll" checked />
        <span>Scrape all connections (scroll until list ends)</span>
      </label>

      <div id="targetWrap" class="target-wrap hidden">
        <label for="targetCount">Max connections to collect</label>
        <input type="number" id="targetCount" min="1" max="30000" value="500" />
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn btn-primary">Start Scraping</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>Stop</button>
    </section>

    <section class="status" id="statusSection">
      <div class="status-row">
        <span class="status-label">Status:</span>
        <span id="statusText" class="status-value">Idle</span>
      </div>
      <div class="status-row">
        <span class="status-label">Collected:</span>
        <span id="connCount" class="status-value">0</span>
        <span id="targetDisplay" class="status-target"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="logArea" class="log-area" aria-live="polite"></div>
    </section>

    <section class="exports">
      <button id="downloadJsonBtn" class="btn btn-export" disabled>Download JSON</button>
      <button id="downloadCsvBtn" class="btn btn-export" disabled>Download CSV</button>
      <button id="clearBtn" class="btn btn-danger">Clear Data</button>
    </section>

    <footer>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
